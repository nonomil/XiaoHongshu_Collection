<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>XHS Local Ingress</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="popup-shell">
    <section class="hero">
      <p class="eyebrow">Local Ingress</p>
      <h1>发送当前页面到本地归档</h1>
      <p class="subcopy">浏览当前标签页，一键立即保存或加入本地收件箱。</p>
    </section>

    <section class="page-card">
      <p class="label">当前页面</p>
      <h2 id="page-title">正在读取标签页…</h2>
      <p id="page-url" class="page-url"></p>
    </section>

    <section class="actions">
      <button id="save-local" type="button">立即保存到本地</button>
      <button id="enqueue-local" type="button" class="secondary">加入本地收件箱</button>
      <button id="open-workbench" type="button" class="ghost">打开工作台</button>
    </section>

    <section id="status" class="status" aria-live="polite">等待操作</section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
